<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ServerOps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="login-body">
<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <span class="login-icon">⬡</span>
      <h1 class="login-title">ServerOps</h1>
      <p class="login-sub">Infrastructure Inventory</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST" class="login-form">
      <div class="field">
        <label class="label">Username</label>
        <input class="input" type="text" name="username" required autofocus>
      </div>
      <div class="field">
        <label class="label">Password</label>
        <input class="input" type="password" name="password" required>
      </div>
      <button class="btn btn-primary btn-full" type="submit">Sign In →</button>
    </form>
    <p class="login-hint">Default: admin / admin123</p>
  </div>
</div>
</body>
</html>
